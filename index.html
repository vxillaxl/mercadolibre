<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MercadoLibre Clone</title>

<link rel="stylesheet" href="styles.css">

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">

</head>

<body>

<header id="navbar">

<div class="nav-container">

<img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/2/2e/MercadoLibre_new.svg">

<div class="search-wrapper">

<form onsubmit="handleSearch(event)">

<input 
type="text"
id="search-input"
placeholder="Buscar productos, marcas y más..."
>

<button type="submit">🔍</button>

</form>

<div id="search-suggestions"></div>

</div>

<div class="cart">
🛒 <span id="cart-badge">0</span>
</div>

</div>

</header>


<section class="banner">

<div class="banner-slide active">
<h2>Ofertas increíbles</h2>
</div>

<div class="banner-slide">
<h2>Tecnología con descuento</h2>
</div>

<div class="banner-slide">
<h2>Envíos gratis a todo el país</h2>
</div>

</section>



<section class="products">

<article class="product-card">

<div class="product-img">📱</div>

<h3>Samsung Galaxy</h3>

<p class="price">$1.299.000</p>

<button onclick="addToCart('Samsung Galaxy')">
Agregar al carrito
</button>

</article>


<article class="product-card">

<div class="product-img">💻</div>

<h3>Laptop Lenovo</h3>

<p class="price">$1.749.000</p>

<button onclick="addToCart('Laptop Lenovo')">
Agregar al carrito
</button>

</article>


<article class="product-card">

<div class="product-img">🎧</div>

<h3>Audífonos Sony</h3>

<p class="price">$399.000</p>

<button onclick="addToCart('Audífonos Sony')">
Agregar al carrito
</button>

</article>

</section>


<div id="toast"></div>


<script src="app.js"></script>

</body>
</html>
